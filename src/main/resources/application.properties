spring.application.name=ostad_assignment_25

# Persistent H2 DB (file-based)
spring.datasource.url=jdbc:h2:file:./data/repo-reader-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# GitHub source configuration
app.github.owner=abusaeed2433
app.github.repo=JavaInREADME
app.github.branch=main
app.github.readme-path=README.md
app.github.base-url=https://api.github.com
app.github.raw-base-url=https://raw.githubusercontent.com
app.github.token=

# Refresh at least once per day
app.sync.cron=0 0 */6 * * *
